<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailEasy - Email Tool</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Poppins', sans-serif;
      background:radial-gradient(circle at top left,#1a1a1a,#050505 45%,#000000);
      color:#fff;
    }

    :root {
      --navy:#000000;
      --navy-light:#111111;
      --gold:#f5c542;
      --white:#ffffff;
      --danger:#ff4d4d;
      --success:#35d07f;
    }

    .container {
      display:flex;
      min-height:100vh;
      flex-wrap:wrap;
    }

    .sidebar {
      width:320px;
      background:var(--navy-light);
      padding:25px;
      border-right:1px solid rgba(255,255,255,0.1);
    }

    .sidebar h3 {
      color:var(--gold);
      margin-bottom:20px;
    }

    .upload-box {
      border:2px dashed rgba(255,255,255,0.2);
      padding:20px;
      border-radius:12px;
      text-align:center;
      margin-bottom:20px;
    }

    .upload-box input { display:none; }

    .upload-label {
      display:inline-block;
      margin-top:12px;
      background:var(--gold);
      color:#111;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }

    .file-list {
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .saved-file {
      border:1px solid rgba(245,197,66,0.12);
      background:rgba(255,255,255,0.08);
      padding:12px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
      font-size:14px;
      word-break:break-word;
    }

    .saved-file:hover {
      background:rgba(212,175,55,0.2);
    }

    .main {
      flex:1;
      padding:40px;
    }

    .hero {
      margin-bottom:30px;
    }

    .logo {
      letter-spacing:2px;
      text-transform:uppercase;
      text-shadow:0 0 20px rgba(245,197,66,0.35);
      color:var(--gold);
      font-size:34px;
      font-weight:700;
    }

    .tagline {
      margin-top:8px;
      color:#c9d6e2;
    }

    .card {
      backdrop-filter: blur(16px);
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      border:1px solid rgba(255,255,255,0.08);
      background:#0e213b;
      border-radius:20px;
      padding:30px;
      box-shadow:0 20px 40px rgba(0,0,0,0.3);
      animation:fadeIn 0.5s ease;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
      margin-bottom:20px;
    }

    input, textarea {
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      outline:none;
      background:#152b4a;
      color:white;
      font-family:inherit;
    }

    textarea {
      min-height:180px;
      resize:vertical;
      margin-bottom:20px;
    }

    .attachments {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
    }

    .attachment {
      background:rgba(212,175,55,0.15);
      border:1px solid rgba(212,175,55,0.4);
      padding:8px 12px;
      border-radius:10px;
      font-size:13px;
    }

    .attachment button {
      margin-left:8px;
      background:none;
      border:none;
      color:var(--danger);
      cursor:pointer;
    }

    .send-btn {
      background: linear-gradient(135deg,#f5c542,#d8a514);
      box-shadow:0 10px 30px rgba(245,197,66,0.25);
      width:100%;
      padding:18px;
      border:none;
      border-radius:12px;
      background:var(--gold);
      color:#111;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
    }

    .send-btn:hover {
      transform:translateY(-2px);
    }

    .send-btn.loading {
      opacity:0.8;
      pointer-events:none;
    }

    .status {
      margin-top:15px;
      font-weight:600;
    }

    .guide {
      margin-top:30px;
      padding:20px;
      background:rgba(255,255,255,0.04);
      border-radius:15px;
    }

    .guide h4 {
      color:var(--gold);
      margin-bottom:12px;
    }

    .guide p {
      margin:6px 0;
      color:#d7e0ea;
      font-size:14px;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }

    @media(max-width:900px){
      .container { flex-direction:column; }
      .sidebar { width:100%; }
      .grid { grid-template-columns:1fr; }
      .main { padding:20px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h3>File Storage</h3>

    <div class="upload-box">
      <div>Select files to save locally</div>
      <label for="fileInput" class="upload-label">Choose Files</label>
      <input type="file" id="fileInput" multiple>
    </div>

    <div class="file-list" id="fileList"></div>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="hero">
      <div class="logo">MailEasy</div>
      <div class="tagline">Send Professional Emails in One Click — No Tech Skills Needed</div>
    </div>

    <form class="card" id="emailForm">

      <div class="grid">
        <input id="recipient" placeholder="Recipient Email Address">
        <input id="sender" placeholder="Your Name">
      </div>

      <input id="subject" placeholder="Subject" style="margin-bottom:20px;">

      <textarea id="message" placeholder="Your Message"></textarea>

      <div class="attachments" id="attachments"></div>

      
      <button type="button" class="send-btn" id="sendBtn">Send Email Now</button>

      <div class="status" id="status"></div>

      <div class="guide">
        <h4>How to Use</h4>
        <p>Step 1 — Upload your files in the panel</p>
        <p>Step 2 — Enter recipient email</p>
        <p>Step 3 — Write your message</p>
        <p>Step 4 — Attach files you want</p>
        <p>Step 5 — Click Send</p>
      </div>

    </form>

  </main>
</div>

<script>
  // ==================================================
  // ADD YOUR REAL EMAILJS CREDENTIALS BELOW
  // ==================================================
 const EMAILJS_PUBLIC_KEY = "8ZzMNsv-Pnp4Cv4pf";
  const EMAILJS_SERVICE_ID = "service_u23y3pm";
  const EMAILJS_TEMPLATE_ID = "template_ut57u3m";
  const CLOUDINARY_CLOUD_NAME = "dpfjkkaaa";
  const CLOUDINARY_UPLOAD_PRESET = "mail_files"

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  const fileInput = document.getElementById("fileInput");
  const fileList = document.getElementById("fileList");
  const attachmentsEl = document.getElementById("attachments");
  const sendBtn = document.getElementById("sendBtn");
  const statusEl = document.getElementById("status");

  let attachedFiles = [];

  function getSavedFiles(){
    return JSON.parse(localStorage.getItem("mailEasyFiles") || "[]");
  }

  function saveFiles(files){
    localStorage.setItem("mailEasyFiles", JSON.stringify(files));
  }

  function renderSavedFiles(){
    fileList.innerHTML = "";

    const files = getSavedFiles();

    files.forEach(file => {
      const item = document.createElement("div");
      item.className = "saved-file";
      item.textContent = '📎 ' + file.name;

      item.onclick = () => {
        if(!attachedFiles.find(x => x.name === file.name)) {
          attachedFiles.push(file);
          renderAttachments();
        }
      };

      fileList.appendChild(item);
    });
  }

  function renderAttachments(){
    attachmentsEl.innerHTML = "";

    attachedFiles.forEach((file, index) => {
      const div = document.createElement("div");
      div.className = "attachment";
      div.innerHTML = `${file.name} <button onclick="removeAttachment(${index})">✖</button>`;
      attachmentsEl.appendChild(div);
    });
  }

  function removeAttachment(index){
    attachedFiles.splice(index,1);
    renderAttachments();
  }

  fileInput.addEventListener("change", async function(){
    const existing = getSavedFiles();

    for(const file of this.files){
      const reader = new FileReader();

      await new Promise(resolve => {
        reader.onload = function(e){
          if(file.size > 5 * 1024 * 1024){
            alert('For browser local storage, please upload files below 5MB each.');
            resolve();
            return;
          }

          existing.push({
            name:file.name,
            type:file.type,
            data:e.target.result
          });
          resolve();
        };

        reader.readAsDataURL(file);
      });
    }

    saveFiles(existing);
    renderSavedFiles();
    fileInput.value = "";
  });

  sendBtn.addEventListener("click", async () => {

    const recipient = document.getElementById("recipient").value.trim();
    const sender = document.getElementById("sender").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!recipient || !sender || !subject || !message) {
      statusEl.style.color = "#ff4d4d";
      statusEl.textContent = "Please fill all required fields.";
      return;
    }

    sendBtn.classList.add("loading");
    sendBtn.textContent = "Sending...";
    statusEl.textContent = "";

    try {
      const uploadedLinks = [];

      if (attachedFiles.length > 0) {
        for (const file of attachedFiles) {
          const blob = await (await fetch(file.data)).blob();

          const formData = new FormData();
          formData.append("file", blob, file.name);
          formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

          const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, {
            method: "POST",
            body: formData
          });

          if (!uploadRes.ok) {
            throw new Error("Cloud upload failed");
          }

          const uploadData = await uploadRes.json();

          if (uploadData.secure_url) {
            const directDownloadUrl = uploadData.secure_url.replace('/upload/', '/upload/fl_attachment/');
           uploadedLinks.push(`${file.name}: ${directDownloadUrl}`);
          }
        }
      }

      const fileLinks = uploadedLinks.join("\n");

      await emailjs.send(
        EMAILJS_SERVICE_ID,
        EMAILJS_TEMPLATE_ID,
        {
          to_email: recipient,
          from_name: sender,
          subject: subject,
          message: message + (fileLinks ? "\n\nDownload Files:\n" + fileLinks : "")
        }
      );

      statusEl.style.color = "#35d07f";
      statusEl.textContent = "Email Sent Successfully!";

      document.getElementById("recipient").value = "";
      document.getElementById("sender").value = "";
      document.getElementById("subject").value = "";
      document.getElementById("message").value = "";

      attachedFiles = [];
      renderAttachments();

    } catch (err) {
      statusEl.style.color = "#ff4d4d";
      statusEl.textContent = err.message || "Failed to send email.";
      console.error(err);
    }

    sendBtn.classList.remove("loading");
    sendBtn.textContent = "Send Email Now";
  });

  renderSavedFiles();
</script>

</body>
</html>
